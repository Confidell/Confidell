<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/assets/icons/Mascote_Branco.svg" type="image/x-icon">
    <link rel="stylesheet" href="/styles/style.css">
    <title>Confidell</title>
</head>
<body>
    <!-- HEADER -->
    <header id="header">
        <div class="botoes">
            <div class="btn-idioma">
                <img src="/assets/icons/Icone_Idioma.svg" alt="Ícone de idioma" class="icone-idioma" loading="lazy">
                <select name="idioma" id="idioma-select">
                    <option value="pt-br">Português (Brasil)</option>
                    <option value="en">English</option>
                    <option value="es">Español</option>
                </select>
            </div>

            <div class="btn-tema">
                <div class="esfera">
                    <img src="/assets/icons/Icone_Darkmode.svg" alt="Ícone de tema" class="icone-tema" loading="lazy">
                </div>
            </div>
        </div>

        <img src="/assets/icons/Logo.svg" alt="Logo da Confidell" class="logo" loading="lazy">

        <div class="menu"></div>
    </header>
    <!-- CONTEUDO PRINCIPAL -->
    <main>
        <!-- SESSÃO INICIAL - BANNER -->
        <section id="banner-inicial">

            <!-- TEXTO TITULO + SLOGAN -->
            <article class="intro">
                <div class="titulo">
                    <h1>Bem-vindo à Confidell</h1>
                    <hr>
                </div>

                <div class="slogan">
                    <p>ONDE A <span style="color: var(--verde);">CONFIANÇA</span></p>

                    <p>ENCONTRA A <span style="color: var(--amarelo);">INOVAÇÃO</span>,</p> 

                    <p>E O <span style="color: var(--azul);">COMPROMISSO</span> VOCÊ</p>
                </div>
            </article>

            <!-- REDES SOCIAIS -->
            <div class="redes">
                <a href="" style="animation-delay: 0s;"><img src="/assets/icons/Logo_X.svg" alt="X" loading="lazy"></a>
                <a href="" style="animation-delay: 0.2s;"><img src="/assets/icons/Logo_Instagram.svg" alt="Instagram" loading="lazy"></a>
                <a href="" style="animation-delay: 0.5s;"><img src="/assets/icons/Logo_Whatsapp.svg" alt="Whatsapp" loading="lazy"></a>
                <a href="" style="animation-delay: 0.7s;"><img src="/assets/icons/Logo_Linkedin.svg" alt="Linkedin" loading="lazy"></a>
                <a href="" style="animation-delay: 1s;"><img src="/assets/icons/Logo_Github.svg" alt="Github" loading="lazy"></a>
            </div>
        </section>
    </main>
</body>
</html>
